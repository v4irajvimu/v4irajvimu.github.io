# Run manually after updating scripts/recommendation-avatar-urls.json with fresh
# image URLs (e.g. from DevTools when viewing a LinkedIn recommendation). No scraping.

name: Download recommendation avatars

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: recommendation-avatars
  cancel-in-progress: true

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download images
        run: node scripts/download-recommendation-avatars.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/images/recommendations lib/data/recommendation-avatar-manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh recommendation avatar images"
            git push
          fi
